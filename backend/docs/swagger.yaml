basePath: /
definitions:
  cart.AddToCartRequest:
    properties:
      productId:
        type: string
    type: object
  cart.Cart:
    properties:
      createdAt:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/cart.CartItem'
        type: array
      totalPrice:
        format: float64
        type: number
      updatedAt:
        type: string
      userID:
        type: string
    type: object
  cart.CartItem:
    properties:
      cartID:
        type: string
      id:
        type: string
      price:
        format: float64
        type: number
      productID:
        type: string
      quantity:
        type: integer
    type: object
  cart.RemoveFromCartRequest:
    properties:
      productId:
        type: string
    type: object
  cart.UpdateQuantityRequest:
    properties:
      productId:
        type: string
      type:
        description: '"increase" ya "decrease"'
        type: string
    type: object
  order.CreateOrderRequest:
    properties:
      amount:
        type: number
      currency:
        type: string
      products:
        items:
          $ref: '#/definitions/order.OrderItemRequest'
        type: array
      shipping:
        type: number
      tax:
        type: number
    type: object
  order.OrderItemRequest:
    properties:
      price:
        type: number
      productId:
        type: string
      quantity:
        type: integer
    type: object
  order.VerifyPaymentRequest:
    properties:
      paymentFailed:
        type: boolean
      razorpay_order_id:
        type: string
      razorpay_payment_id:
        type: string
      razorpay_signature:
        type: string
    type: object
  product.ProductImageResponse:
    properties:
      public_id:
        type: string
      url:
        type: string
    type: object
  product.ProductResponse:
    properties:
      brand:
        type: string
      category:
        type: string
      id:
        type: string
      productDesc:
        type: string
      productImg:
        items:
          $ref: '#/definitions/product.ProductImageResponse'
        type: array
      productName:
        type: string
      productPrice:
        type: number
    type: object
  user.ChangePasswordRequest:
    properties:
      confirmPassword:
        type: string
      newPassword:
        type: string
    type: object
  user.ForgotPasswordRequest:
    properties:
      email:
        type: string
    type: object
  user.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  user.LoginResponse:
    properties:
      refreshToken:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/user.UserResponse'
    type: object
  user.RegisterRequest:
    properties:
      email:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      password:
        type: string
    type: object
  user.UpdateUserRequest:
    properties:
      address:
        type: string
      city:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      phoneNo:
        type: string
      role:
        type: string
      zipCode:
        type: string
    type: object
  user.UserResponse:
    properties:
      address:
        type: string
      city:
        type: string
      email:
        type: string
      firstName:
        type: string
      id:
        type: string
      isLoggedIn:
        type: boolean
      isVerified:
        type: boolean
      lastName:
        type: string
      phoneNo:
        type: string
      profilePic:
        type: string
      refreshToken:
        type: string
      role:
        type: string
      token:
        type: string
      zipCode:
        type: string
    type: object
  user.VerifyOTPRequest:
    properties:
      email:
        type: string
      otp:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is a sample server Ekart server.
  title: Ekart API
  version: "1.0"
paths:
  /cart:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cart.Cart'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get cart
      tags:
      - Cart
    post:
      consumes:
      - application/json
      parameters:
      - description: Cart payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cart.AddToCartRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cart.Cart'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Add to cart
      tags:
      - Cart
  /cart/remove:
    post:
      consumes:
      - application/json
      parameters:
      - description: Cart removal payload
        in: body
        name: request
        required: true
        schema:
